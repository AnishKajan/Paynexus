# ============================================================
#  Paynexus — Deploy Backend to Azure Container Apps
#
#  Triggers:
#    - After build-and-push-backend completes on main
#    - Manually via workflow_dispatch (fresh deploy at any time)
#
#  Steps (all idempotent — safe to re-run on fresh subscription):
#    1. Azure OIDC login
#    2. Register providers
#    3. Ensure resource group
#    4. Ensure Log Analytics workspace
#    5. Ensure Container App Environment
#    6. Create or update paynexus-api Container App
#    7. Health check gate
#
#  Required GitHub Secrets:
#    AZURE_CLIENT_ID        AZURE_TENANT_ID        AZURE_SUBSCRIPTION_ID
#    SUPABASE_URL           SUPABASE_ANON_KEY
#    SUPABASE_JWT_SECRET    SUPABASE_JWKS_URL
#
#  OIDC federated credential must match subject:
#    repo:AnishKajan/Paynexus:ref:refs/heads/main
#  (No "environment:" job key — that changes the subject to environment:<name>)
# ============================================================

name: Deploy to Azure

on:
  workflow_run:
    workflows: ["Build & Push Backend"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: false
        default: "latest"

permissions:
  contents: read
  id-token: write
  packages: read

env:
  RESOURCE_GROUP: Paynexus
  LOCATION: eastus2
  LAW_NAME: law-paynexus-prod
  CAE_NAME: cae-paynexus-prod
  APP_NAME: paynexus-api

jobs:
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # ── 0. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Azure OIDC login ────────────────────────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── 2. Resolve image tag ───────────────────────────────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || 'latest' }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/paynexus-backend:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploying: ghcr.io/${{ github.repository_owner }}/paynexus-backend:${TAG}"

      # ── 3. Register providers (best-effort — requires subscription Contributor)
      # Azure auto-registers providers on first resource creation, so this step
      # failing is non-fatal when the SP is scoped to the resource group only.
      - name: Register Azure providers
        run: |
          az provider register --namespace Microsoft.App --wait || echo "Provider registration skipped (SP may lack subscription scope — Azure will auto-register on first use)"
          az provider register --namespace Microsoft.OperationalInsights --wait || echo "Provider registration skipped"

      # ── 4. Ensure resource group ───────────────────────────────────────────────
      - name: Ensure resource group
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP }}" \
            --location "${{ env.LOCATION }}" \
            --output none
          echo "Resource group '${{ env.RESOURCE_GROUP }}' ready."

      # ── 5. Ensure Log Analytics workspace ─────────────────────────────────────
      - name: Ensure Log Analytics workspace
        id: law
        run: |
          EXISTS=$(az monitor log-analytics workspace show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --workspace-name "${{ env.LAW_NAME }}" \
            --query "customerId" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating Log Analytics workspace..."
            az monitor log-analytics workspace create \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --workspace-name "${{ env.LAW_NAME }}" \
              --location "${{ env.LOCATION }}" \
              --sku PerGB2018 \
              --output none
            echo "Created."
          else
            echo "Log Analytics workspace already exists."
          fi

          WS_ID=$(az monitor log-analytics workspace show \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --workspace-name "${{ env.LAW_NAME }}" \
            --query "customerId" -o tsv)

          WS_KEY=$(az monitor log-analytics workspace get-shared-keys \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --workspace-name "${{ env.LAW_NAME }}" \
            --query "primarySharedKey" -o tsv)

          echo "::add-mask::${WS_KEY}"
          echo "ws_id=${WS_ID}" >> "$GITHUB_OUTPUT"
          echo "ws_key=${WS_KEY}" >> "$GITHUB_OUTPUT"
          echo "Workspace ID: ${WS_ID}"

      # ── 6. Ensure Container App Environment ───────────────────────────────────
      - name: Ensure Container App Environment
        env:
          WS_KEY: ${{ steps.law.outputs.ws_key }}
        run: |
          EXISTS=$(az containerapp env show \
            --name "${{ env.CAE_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating Container App Environment..."
            az containerapp env create \
              --name "${{ env.CAE_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --location "${{ env.LOCATION }}" \
              --logs-workspace-id "${{ steps.law.outputs.ws_id }}" \
              --logs-workspace-key "${WS_KEY}" \
              --output none
            echo "Created."
          else
            echo "Container App Environment already exists."
          fi

      # ── 7. Create or update paynexus-api ──────────────────────────────────────
      - name: Deploy paynexus-api
        id: deploy
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_JWKS_URL: ${{ secrets.SUPABASE_JWKS_URL }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="${{ steps.tag.outputs.image }}"

          EXISTS=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Container App not found — creating..."
            # Pass env vars directly (no --secrets/secretref) so empty values
            # don't cause ContainerAppSecretInvalid. Backend uses in-memory
            # state and will start without Supabase configured.
            az containerapp create \
              --name "${{ env.APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --environment "${{ env.CAE_NAME }}" \
              --image "${IMAGE}" \
              --registry-server "ghcr.io" \
              --registry-username "${{ github.repository_owner }}" \
              --registry-password "${GHCR_TOKEN}" \
              --target-port 8080 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 2 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --env-vars \
                "PORT=8080" \
                "PAYNEXUS_ENV=sandbox" \
                "SUPABASE_URL=${SUPABASE_URL}" \
                "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}" \
                "SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}" \
                "SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL}" \
              --output none
            echo "Container App created."
          else
            echo "Container App exists — updating image..."
            az containerapp update \
              --name "${{ env.APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --image "${IMAGE}" \
              --output none
            echo "Container App updated."
          fi

          FQDN=$(az containerapp show \
            --name "${{ env.APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "fqdn=${FQDN}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "API URL: https://${FQDN}"

      # ── 8. Job summary ─────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          FQDN="${{ steps.deploy.outputs.fqdn }}"
          {
            echo "### Paynexus Deploy Complete"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **API URL** | https://${FQDN} |"
            echo "| **Image** | \`${{ steps.tag.outputs.image }}\` |"
            echo "| **Health** | https://${FQDN}/api/health |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 9. Health check ────────────────────────────────────────────────────────
      - name: Health check
        run: |
          FQDN="${{ steps.deploy.outputs.fqdn }}"
          URL="https://${FQDN}/api/health"
          echo "Polling ${URL} (18 attempts × 10s = 3 min max)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" 2>/dev/null || echo "000")
            echo "  [${i}/18] HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "API is healthy!"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: API not healthy after 3 minutes."
          echo "Check logs: az containerapp logs show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --follow"
          exit 1
