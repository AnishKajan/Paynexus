# ============================================================
#  Paynexus — CI/CD Deploy Workflow
#  Trigger  : push to main branch
#  Actions  :
#    1. Build & push backend image  → ghcr.io/anishkajan/paynexus-backend
#    2. Build & push MCP image      → ghcr.io/anishkajan/paynexus-mcp
#    3. Login to Azure via OIDC (no stored credentials)
#    4. Deploy Bicep to Azure Container Apps
#
#  Required GitHub secrets:
#    AZURE_CLIENT_ID        — App registration client ID (OIDC)
#    AZURE_TENANT_ID        — Azure AD tenant ID
#    AZURE_SUBSCRIPTION_ID  — Target subscription ID
#    SUPABASE_URL           — https://<ref>.supabase.co
#    SUPABASE_ANON_KEY      — Supabase anon (public) key
#    SUPABASE_JWT_SECRET    — Supabase JWT secret
#    SUPABASE_JWKS_URL      — https://<ref>.supabase.co/auth/v1/keys
# ============================================================

name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write       # push to GHCR
  id-token: write       # OIDC token for Azure login

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: anishkajan
  BACKEND_IMAGE: ghcr.io/anishkajan/paynexus-backend
  MCP_IMAGE: ghcr.io/anishkajan/paynexus-mcp
  RESOURCE_GROUP: Paynexus
  AZURE_LOCATION: eastus2

jobs:
  # ── Job 1: Build and push container images ──────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.MCP_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Backend (Rust) ───────────────────────────────────────────────────────
      - name: Set up Docker Buildx (backend)
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── MCP (Node.js) ────────────────────────────────────────────────────────
      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: ../paynexus-mcp
          file: ../paynexus-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.MCP_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.MCP_IMAGE }}:latest
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

  # ── Job 2: Deploy infrastructure via Bicep ──────────────────────────────────
  deploy-infra:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # OIDC login — no stored credentials, uses federated identity
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name ${{ env.RESOURCE_GROUP }} \
            --location ${{ env.AZURE_LOCATION }} \
            --output none

      - name: Deploy Bicep template
        run: |
          az deployment group create \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
                location="${{ env.AZURE_LOCATION }}" \
                environmentTag="prod" \
                ghcrUsername="${{ env.IMAGE_OWNER }}" \
                ghcrToken="${{ secrets.GITHUB_TOKEN }}" \
                imageTag="${{ needs.build-and-push.outputs.image-tag }}" \
                supabaseUrl="${{ secrets.SUPABASE_URL }}" \
                supabaseAnonKey="${{ secrets.SUPABASE_ANON_KEY }}" \
                supabaseJwtSecret="${{ secrets.SUPABASE_JWT_SECRET }}" \
                supabaseJwksUrl="${{ secrets.SUPABASE_JWKS_URL }}" \
            --output json | tee deployment-output.json

      - name: Print deployment outputs
        run: |
          echo "=== Deployment Outputs ==="
          cat deployment-output.json | jq '.properties.outputs'
          API_URL=$(cat deployment-output.json | jq -r '.properties.outputs.apiUrl.value // empty')
          MCP_URL=$(cat deployment-output.json | jq -r '.properties.outputs.mcpUrl.value // empty')
          echo ""
          echo "API URL : $API_URL"
          echo "MCP URL : $MCP_URL"

      - name: Health check — API
        run: |
          API_FQDN=$(cat deployment-output.json | jq -r '.properties.outputs.apiFqdn.value // empty')
          if [ -n "$API_FQDN" ]; then
            echo "Waiting for API to become healthy at https://${API_FQDN}/api/health ..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${API_FQDN}/api/health" || echo "000")
              echo "  Attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "API is healthy!"
                exit 0
              fi
              sleep 10
            done
            echo "WARNING: API health check did not return 200 within 2 minutes."
          else
            echo "No API FQDN in output — skipping health check."
          fi
